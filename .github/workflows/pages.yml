name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout driving-license-quiz
        uses: actions/checkout@v4

      - name: Checkout musasi2json (private)
        uses: actions/checkout@v4
        with:
          repository: rayfiyo/musasi2json
          ref: main
          token: ${{ secrets.MUSASI2JSON_READ_TOKEN }}
          path: .musasi2json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: static-web-gen/go.mod
          cache: false

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.150.0'
          extended: true

      - name: Generate quiz data and workbook pages
        run: |
          cd static-web-gen
          go run . -dataset ../.musasi2json/dataset

      - name: Build Hugo site
        working-directory: site
        run: |
          hugo \
            --destination ../.pages \
            --gc \
            --minify

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
